<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Trade</title>

<style>

:root{
    --bg:#0f1117;
    --card:#161b22;
    --accent:#00ff9c;
    --text:#e6fef4;
    --muted:#8fbfb0;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:system-ui;
}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:900px;
    background:var(--card);
    padding:30px;
    border-radius:12px;
    border:1px solid rgba(0,255,156,.1);
}

h1{
    margin-bottom:6px;
}

.subtitle{
    color:var(--muted);
    margin-bottom:25px;
}

/* FORM GRID */

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:16px;
}

label{
    font-size:14px;
    color:var(--muted);
    display:block;
    margin-bottom:4px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    background:#0c0f14;
    border:1px solid rgba(0,255,156,.2);
    color:white;
    border-radius:6px;
}

input:focus,select:focus,textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 6px rgba(0,255,156,.5);
    outline:none;
}

textarea{
    grid-column:1 / -1;
    height:90px;
}

/* RR */

.rr-display{
    margin-top:15px;
    color:var(--accent);
    font-weight:bold;
}

/* BUTTON */

/* ===== BUTTON CONTAINER ===== */
.actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

/* ===== BASE BUTTON ===== */
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  border: none;
}

/* ===== SAVE BUTTON (PRIMARY) ===== */
.btn-save {
  background: #00ff9c;
  color: #000;
  box-shadow: 0 4px 20px rgba(0, 255, 156, 0.15);
  animation: pulseGlow 2s infinite;
}

.btn-save:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(0, 255, 156, 0.7),
              0 6px 25px rgba(0, 255, 156, 0.3);
}

/* ===== CANCEL BUTTON (GLASSMORPHISM) ===== */
.btn-cancel {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #e6fef4;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.btn-cancel:hover {
  border-color: #00ff9c;
  background: rgba(0, 255, 156, 0.08);
  transform: translateY(-2px);
  box-shadow: 0 0 10px rgba(0,255,156,0.3);
}

/* ===== OPTIONAL ICON SPACING ===== */
.btn span {
  margin-right: 6px;
}

/* ===== PULSE GLOW ANIMATION ===== */
@keyframes pulseGlow {
  0% {
    box-shadow: 0 0 5px rgba(0,255,156,0.2);
  }
  50% {
    box-shadow: 0 0 15px rgba(0,255,156,0.5);
  }
  100% {
    box-shadow: 0 0 5px rgba(0,255,156,0.2);
  }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
  .actions {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<div class="card">

<h1>Edit Trade</h1>
<p class="subtitle">Update your trade details.</p>

<form action="/edit_trade/{{ trade.id }}" method="POST">

<div class="form-grid">

<div>
<label>Date</label>
<input type="date" name="date"
value="{{ trade.date.strftime('%Y-%m-%d') if trade.date else '' }}">
</div>

<div>
<label>Asset / Pair</label>
<input type="text" name="asset"
value="{{ trade.asset }}">
</div>

<div>
<label>Direction</label>
<select name="direction">
<option {{ 'selected' if trade.direction == 'Long' else '' }}>Long</option>
<option {{ 'selected' if trade.direction == 'Short' else '' }}>Short</option>
</select>
</div>

<div>
<label>Entry Price</label>
<input id="entry" type="number" step="any" name="entry"
value="{{ trade.entry }}">
</div>

<div>
<label>Stop Loss</label>
<input id="sl" type="number" step="any" name="stop_loss"
value="{{ trade.stop_loss }}">
</div>

<div>
<label>Take Profit</label>
<input id="tp" type="number" step="any" name="take_profit"
value="{{ trade.take_profit }}">
</div>

<div>
<label>Exit Price</label>
<input type="number" step="any" name="exit"
value="{{ trade.exit }}">
</div>

<div>
<label>Position Size</label>
<input type="number" step="any" name="size"
value="{{ trade.size }}">
</div>

<div>
<label>Strategy Tag</label>
<input type="text" name="strategy"
value="{{ trade.strategy }}">
</div>

<div>
<label>Result</label>
<select name="result">
<option {{ 'selected' if trade.result == 'Win' else '' }}>Win</option>
<option {{ 'selected' if trade.result == 'Loss' else '' }}>Loss</option>
<option {{ 'selected' if trade.result == 'Break Even' else '' }}>Break Even</option>
</select>
</div>

<textarea name="notes">{{ trade.notes }}</textarea>

</div>

<div class="rr-display" id="rr">
Risk Reward: -
</div>

<div class="actions">
  <button class="btn btn-save"><span></span>Save Changes</button>
  <a href="/journal" class="btn btn-cancel"><span></span>Cancel</a>
</div>

</form>

</div>

<script>

const entry=document.getElementById("entry")
const sl=document.getElementById("sl")
const tp=document.getElementById("tp")
const rrDisplay=document.getElementById("rr")

function calcRR(){

let e=parseFloat(entry.value)
let s=parseFloat(sl.value)
let t=parseFloat(tp.value)

if(e && s && t){

let rr=(t-e)/(e-s)

rrDisplay.innerText="Risk Reward: "+rr.toFixed(2)+" R"

}

}

// run on load (สำคัญ!)
window.onload=calcRR

entry.oninput=calcRR
sl.oninput=calcRR
tp.oninput=calcRR

</script>

</body>
</html>
