<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>

  <style>
    :root {
      --bg: #0f1117;
      --card: #161b22;
      --accent: #00ff9c;
      --text: #e6edf3;
      --subtext: #8b949e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      height: 100vh;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
      animation: fadeIn 1s ease-in-out;
    }

    .container {
      background: var(--card);
      padding: 50px 12px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: clamp(60px, 8vw, 100px);
      font-weight: 800;
      letter-spacing: 2px;

      background: linear-gradient(90deg, #00ff9c, #00cfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow: 0 0 20px rgba(0,255,156,0.5);
      animation: float 3s ease-in-out infinite;
    }

    p {
      margin-top: 15px;
      font-size: 16px;
      color: var(--subtext);
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 24px;
      border-radius: 10px;
      background: var(--accent);
      color: #000;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(0,255,156,0.6);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 20px;
      }

      p {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>COMING SOON</h1>
    <p>This feature is under development</p>
    <a href="/journal" class="btn">Back to Home</a>
  </div>
</body>
</html>
